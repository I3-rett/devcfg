version: "2"

linters:
  enable:
    - govet
    - gocyclo
    - ineffassign
    - misspell
    - revive

  settings:
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: exported

formatters:
  enable:
    - gofmt

issues:
  exclude-rules:
    # BubbleTea Update and View methods are inherently complex due to the
    # message-dispatch pattern; refactoring them would not improve readability.
    - path: internal/tui/steps/tools\.go
      linters: [gocyclo]
